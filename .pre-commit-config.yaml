repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic -W clippy::nursery -W clippy::cargo
        language: system
        pass_filenames: false
        always_run: true

      - id: kiss-check
        name: kiss check
        entry: kiss check .
        language: system
        pass_filenames: false
        always_run: true

      - id: check-untracked
        name: check untracked source files
        entry: admin/check_untracked.sh
        language: system
        pass_filenames: false
        always_run: true
