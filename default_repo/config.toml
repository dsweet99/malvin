mem_limit_gb = 4
# Terminal color palette: "dark" (default) or "light" (for pale backgrounds).
theme = "dark"

[agent]
model = "auto"
"model-mini" = "anthropic/claude-sonnet-4"
max_hypotheses = 5
max_loops = 1
max_loops_code = 3
max_acp_retries = 3
max_mini_transport_retries = 3

[logs]
# Delete runs older than this many days (dirname timestamp, else mtime).
max_age_days = 90
# Cap total size of ~/.malvin_home/logs/<hash>/ (B, KiB, MiB, GiB, TiB).
max_bytes = "2GiB"
