mem_limit_gb = 4
# Terminal color palette: "dark" (default) or "light" (for pale backgrounds).
theme = "dark"
# When true, run an MPC planning agent to transform user_request_path before the KPop loop.
mpc = true

[agent]
model = "auto"
"model-mini" = "nvidia/nemotron-3-ultra-550b-a55b:free"
max_hypotheses = 5
max_loops = 1
max_loops_code = 3
max_acp_retries = 3
# Retries per OpenRouter HTTP completion for all non-billing failures (429, 5xx, 4xx, transport, JSON decode, provider capacity).
max_mini_transport_retries = 3

[logs]
# Max run directories per workspace bucket; 0 = unlimited.
max_count = 1000
# Delete runs older than this many days (dirname timestamp, else mtime).
max_age_days = 90
# Cap total size of ~/.malvin_home/logs/<hash>/ (B, KiB, MiB, GiB, TiB). Empty = disabled.
max_bytes = "2GiB"
