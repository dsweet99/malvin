[package]
name = "malvin"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Malvin application"
license = "MIT OR Apache-2.0"
readme = "README.md"
repository = "https://github.com/dsweet/malvin"
keywords = ["malvin"]
categories = ["development-tools"]

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
clap = { version = "4", features = ["derive"] }
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = [
    "fs",
    "io-util",
    "macros",
    "process",
    "rt-multi-thread",
    "sync",
    "time",
] }
tracing = "0.1"

[dev-dependencies]
tempfile = "3"

[lib]
name = "malvin"
path = "src/lib.rs"

[[bin]]
name = "malvin"
path = "src/main.rs"

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
pedantic = "warn"
nursery = "warn"
